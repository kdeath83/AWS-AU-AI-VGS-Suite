name: governance-auditor
version: 1.0.0
description: Validates compliance controls and reads Audit Manager/Config for Australian FSI
foundation_model: anthropic.claude-3-sonnet-20240229-v1:0
idle_session_ttl: 1800
tags:
  project: aws-au-ai-vgs-suite
  compliance: APRA-CPS-234
  type: governance

# AgentCore Runtime Configuration
runtime:
  max_tokens: 4096
  temperature: 0.1
  top_p: 0.9

# MCP Server integrations
mcp_servers:
  - server_id: audit-manager
    endpoint: arn:aws:bedrock-agentcore:::mcp-server/audit-manager
    description: Reads Audit Manager assessments and evidence
    required_permissions:
      - auditmanager:GetAssessment
      - auditmanager:GetEvidence
      - auditmanager:GetEvidenceByEvidenceFolder
      - auditmanager:ListEvidence
  - server_id: config-compliance
    endpoint: arn:aws:bedrock-agentcore:::mcp-server/config-compliance
    description: Reads AWS Config rule evaluations and compliance history
    required_permissions:
      - config:GetComplianceDetailsByConfigRule
      - config:GetComplianceSummaryByResourceType
      - config:DescribeComplianceByResource

# Guardrail configuration
guardrails:
  topic_restriction:
    - name: RegulatoryEvasion
      action: BLOCK
  pii_redaction:
    - type: AUSTRALIAN_TAX_FILE_NUMBER
      action: BLOCK
    - type: NAME
      action: ANONYMIZE

# Observability
observability:
  tracing_enabled: true
  logging_level: INFO
  metrics_namespace: VGS/GovernanceAuditor