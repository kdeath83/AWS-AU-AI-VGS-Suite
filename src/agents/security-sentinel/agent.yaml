name: security-sentinel
version: 2.0.0
description: >-
  Monitors AI endpoints and security findings for Australian FSI.
  Deployed as an AgentCore Harness with multi-model routing.
harness_name: aws-au-ai-vgs-suite-security-sentinel-${ENVIRONMENT}
type: harness

# Model Routing (orchestrator selects based on priority)
model_routing:
  critical:
    provider: bedrock
    model_id: anthropic.claude-fable-5
  standard:
    provider: bedrock
    model_id: anthropic.claude-opus-4-8
  fallback:
    provider: openAi
    model_id: gpt-5.5
  budget:
    provider: liteLlm
    model_id: deepseek-v4-pro
    api_base: https://opencode.ai/zen/go/v1

# Execution limits
runtime:
  max_tokens: 4096
  temperature: 0.2
  max_iterations: 15

# MCP Server integrations
mcp_servers:
  - name: guardduty-inspector
    url: https://guardduty-inspector.mcp.aws
    description: Reads GuardDuty findings and Inspector vulnerability scans
    required_permissions:
      - guardduty:GetFindings
      - guardduty:ListFindings
      - inspector2:ListFindings
      - inspector2:GetFindings

# Guardrail configuration
guardrails:
  topic_restriction:
    - name: FinancialAdvice
      action: BLOCK
    - name: ConfidentialDataExfiltration
      action: BLOCK
  pii_redaction:
    - type: AUSTRALIAN_TAX_FILE_NUMBER
      action: BLOCK
    - type: BANK_ACCOUNT_NUMBER
      action: BLOCK
    - type: CREDIT_DEBIT_CARD_NUMBER
      action: BLOCK

# Observability
observability:
  tracing_enabled: true
  logging_level: INFO
  metrics_namespace: VGS/SecuritySentinel

tags:
  project: aws-au-ai-vgs-suite
  compliance: APRA-CPS-234
  type: security
